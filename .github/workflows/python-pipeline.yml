name: python CI/CD - Feature to Development

on:
  pull_request:
    branches: [development]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  checkout-source-code:
    name: Checkout Source Code
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      should_run: ${{ steps.set_output.outputs.should_run }}
    steps:
      - id: set_output
        run: echo "should_run=true" >> $GITHUB_OUTPUT

  codeql-scan:
    name: CodeQL Scanning
    needs: checkout-source-code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

  testing:
    name: Run Unit Tests with Pytest
    needs: codeql-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # pip install -e.

      - name: Run Pytest
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          pytest --junitxml=pytest-report.xml

  build-and-publishing-into-Artifact-package:
    name: Build and Publishing into Artifact package
    needs: testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build module
        run: pip install build

      - name: Build Python package
        run: |
          python -m build --sdist --wheel --outdir dist/
          cd dist
          zip -r ../python-package.zip .

      - name: Upload Python artifact
        uses: actions/upload-artifact@v4
        with:
          name: Python-Artifact-code
          path: python-package.zip

      - name: Checkout Artifact Repository
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/Artifact_Storage
          ref: main
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: Artifact_Storage

      - name: Create artifact directory
        run: mkdir -p Artifact_Storage/Backend_Artifact

      - name: Check for existing latest version hash
        id: skip-check
        run: |
          cd Artifact_Storage/Backend_Artifact
          latest_file=$(ls Backend_Artifact-v*.zip 2>/dev/null | sort -V | tail -n 1)
          if [[ -f "$latest_file" ]]; then
            unzip -p "$latest_file" | sha256sum | cut -d' ' -f1 > ../../latest_hash.txt
          else
            echo "no_previous_hash" > ../../latest_hash.txt
          fi

      - name: Generate current artifact hash
        run: unzip -p python-package.zip | sha256sum | cut -d' ' -f1 > current_hash.txt

      - name: Check for changes
        id: hash-diff
        run: |
          if cmp -s latest_hash.txt current_hash.txt; then
            echo "no_change=true" >> $GITHUB_OUTPUT
          else
            echo "no_change=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no changes
        if: steps.hash-diff.outputs.no_change == 'true'
        run: echo "No changes in Python Artifact code — skipping commit and push."

      - name: Determine next version
        if: steps.hash-diff.outputs.no_change == 'false'
        id: version
        run: |
          cd Artifact_Storage/Backend_Artifact
          count=$(ls Backend_Artifact-v*.zip 2>/dev/null | wc -l)
          echo "version=v$((count + 1))" >> $GITHUB_OUTPUT

      - name: Rename and move artifact
        if: steps.hash-diff.outputs.no_change == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mv python-package.zip Artifact_Storage/Backend_Artifact/Backend_Artifact-${VERSION}.zip
          cp Artifact_Storage/Backend_Artifact/Backend_Artifact-${VERSION}.zip Artifact_Storage/Backend_Artifact/Backend_Artifact-latest.zip

      - name: Commit and push to Artifact Storage Repo
        if: steps.hash-diff.outputs.no_change == 'false'
        run: |
          cd Artifact_Storage
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Backend_Artifact/Backend_Artifact-*.zip
          git commit -m "Add Backend_Artifact ${{ steps.version.outputs.version }}"
          git push origin main

  container-build-and-publish-into-GHCR:
    name: Container Build and Publish into GHCR
    needs: build-and-publishing-into-Artifact-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout Artifact Repository
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/Artifact_Storage
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: Artifact_Storage

      - name: Prepare artifact for Docker build
         run:|
         cp Artifact_Storage/Backend_Artifact/Backend_Artifact-latest.zip ./artifact.zip
  

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Build Docker image for FastAPI
        run: |
          docker build -t fastapi-backend:latest -f Dockerfile .

      - name: Tag Docker image for GHCR
        run: |
          REPO_OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker tag fastapi-backend:latest ghcr.io/${REPO_OWNER_LC}/fastapi-backend:latest

      - name: Push image to GHCR
        run: |
          REPO_OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/${REPO_OWNER_LC}/fastapi-backend:latest

  deploy-to-gke:
    name: Deploy FastAPI App to GKE
    needs: container-build-and-publish-into-GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up kubectl with GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Create GHCR pull secret in GKE
        run: |
          kubectl delete secret ghcr-secret --ignore-not-found
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.MY_GITHUB_TOKEN }} \
            --docker-email=no@email.com

      - name: Deploy to GKE
        run: |
          kubectl apply -f service.yaml
          kubectl apply -f deployment.yaml
          sleep 59
          kubectl rollout restart deployment fastapi-backend
          kubectl rollout status deployment/fastapi-backend
          kubectl get pods
          kubectl get svc -o wide

      - name: Patch deployment to use imagePullSecret
        run: |
          kubectl patch deployment fastapi-backend \
            --patch '{"spec": {"template": {"spec": {"imagePullSecrets": [{"name": "ghcr-secret"}]}}}}'
