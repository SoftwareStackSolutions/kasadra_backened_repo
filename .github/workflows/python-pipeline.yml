  Build:
    name: Build
    # needs: Unit-Testing
    runs-on: ubuntu-latest
    env:
      WORKING_DIR: ./kasadra_frontend   # <--- define here
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
  
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
  
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
  
      - name: Install dependencies
        run: npm install
  
      - name: Build React App
        run: npm run build


    #  Authenticate with GCP using service account JSON key
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
  
       # Create artifact.zip from build folder
      - name: Zip python build
        run: |
          cd ./
          zip -r ../artifact.zip .
          cd ..
          ls -lh artifact.zip
  
      # Upload artifact.zip to GCS bucket
      - name: Upload artifact.zip to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: ./artifact.zip
          destination: kasandra-storage/python-app/${{ github.run_id }}/artifact.zip


  create-pr-development-to-main:
    needs: Build
    runs-on: ubuntu-latest
    outputs:
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create Pull Request from development to main
        id: create_pr
        uses: repo-sync/pull-request@v2
        with:
          source_branch: development
          destination_branch: main
          pr_title: "Auto PR: development to main"
          pr_body: |
            This PR was created from the development to main branch.
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Wait for PR Merge
        run: |
          while true; do
            STATE=$(gh pr view "$PR_NUMBER" --repo SoftwareStackSolutions/kasadra_backened_repo --json state -q .state)
            if [ "$STATE" = "MERGED" ]; then
              echo " PR #$PR_NUMBER has been merged!"
              break
            else
              echo "Not merged yet. Waiting for approval..."
              sleep 30
            fi
          done
        env:
         GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

  Container-Build-and-Publish-into-Registry:
    name: Container Build and Publish into Registry
    needs: create-pr-development-to-main
    runs-on: ubuntu-latest

    steps:

      - name: Checkout main repository (kasadra_backened_repo)
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Checkout artifact repository
        uses: actions/checkout@v3
        with:
          repository: SoftwareStackSolutions/Artifact_Storage
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: Artifact_Storage

      
      - name: Prepare artifact for Docker build
        run: |
          cp Artifact_Storage/Backend_Artifact/Backend_Artifact-latest.zip ./artifact.zip
          
   
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      
      - name: Build Docker image
        run: |
          docker build -t python-application:latest -f Dockerfile . 
            
      - name: Tag image for GHCR
        run: |
          REPO_OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker tag python-application:latest ghcr.io/${REPO_OWNER_LC}/python-application:latest
      
      - name: Push image to GHCR
        run: |
          REPO_OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/${REPO_OWNER_LC}/python-application:latest      

  Deploy-Application-to-GKE:
    name: Deploy Application to GKE
    needs: Container-Build-and-Publish-into-Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3
        with:
          ref: main

  
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
  
      - name: Set up kubectl
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}
  
      - name: Create GHCR imagePullSecret in GKE
        run: |
          kubectl delete secret ghcr-secret --ignore-not-found --namespace=kasadara
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.MY_GITHUB_TOKEN }} \
            --docker-email=no@email.com \
            --namespace=kasadara

      - name: Deploy to GKE
        run: |
          kubectl apply -f config.yaml -n kasadara
          kubectl apply -f deployment.yaml -n kasadara
          kubectl apply -f service.yaml -n kasadara
          kubectl apply -f ingress.yaml -n kasadara
          sleep 59
          kubectl rollout restart deployment python-application -n kasadara
          kubectl get pods -n kasadara -o wide
          kubectl get svc -n kasadara -o wide
          kubectl get ingress -n kasadara -o wide
      
      - name: Patch deployment to use imagePullSecret
        run: |
          kubectl patch deployment python-application \
            -n kasadara \
            --patch '{"spec": {"template": {"spec": {"imagePullSecrets": [{"name": "ghcr-secret"}]}}}}'

