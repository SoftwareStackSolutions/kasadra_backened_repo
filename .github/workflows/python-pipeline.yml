name: python CI/CD pipeline - feature to development

on:
  pull_request:
    branches: [development]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  checkout-source-code:
    name: Checkout Source Code
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      should_run: ${{ steps.set_output.outputs.should_run }}
    steps:
      - id: set_output
        run: echo "should_run=true" >> $GITHUB_OUTPUT

  codeql-scan:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    needs: checkout-source-code
    if: needs.checkout-source-code.outputs.should_run == 'true'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Enable CodeQL Default Setup
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  testing:
    name: Run Unit Tests and Pytests
    runs-on: ubuntu-latest
    needs: codeql-scan
    if: needs.codeql-scan.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run unittest
        run: python -m unittest discover -s tests

      - name: Run pytest
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          pytest tests --junitxml=pytest-report.xml

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

  build-and-publish-artifact:
    name: Build and Publish Artifact Package
    runs-on: ubuntu-latest
    needs: testing
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build Package
        run: |
          pip install build
          python -m build --sdist --wheel --outdir dist/
          cd dist && zip -r ../python-package.zip .

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: python-package.zip

      - name: Checkout Artifact Repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/Artifact_Storage
          ref: main
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: Artifact_Storage

      - name: Push Zipped Artifact with Versioning
        run: |
          mkdir -p Artifact_Storage/Backend_Artifact
          version=v$(date +%Y%m%d%H%M%S)
          cp python-package.zip Artifact_Storage/Backend_Artifact/Backend_Artifact-${version}.zip
          cp python-package.zip Artifact_Storage/Backend_Artifact/Backend_Artifact-latest.zip
          cd Artifact_Storage
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Backend_Artifact/*.zip
          git commit -m "Add Backend Artifact ${version}" || echo "Nothing to commit"
          git pull --rebase
          git push origin main

  create-pr-to-main:
    name: Create PR to Main Branch
    needs: build-and-publish-artifact
    runs-on: ubuntu-latest
    outputs:
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Create Pull Request from development to main
        id: create_pr
        uses: repo-sync/pull-request@v2
        with:
          source_branch: development
          destination_branch: main
          pr_title: "Auto PR: development to main"
          pr_body: |
            This PR was created from the development to main branch.
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Wait for PR Merge
        run: |
          PR_NUMBER=$(gh pr list --state open --json number --jq '.[0].number' --repo "${{ github.repository }}")
          while true; do
            STATE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json state -q .state)
            if [ "$STATE" = "MERGED" ]; then
              echo "✅ PR #$PR_NUMBER has been merged!"
              break
            else
              echo "Not merged yet. Waiting for approval..."
              sleep 30
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

  container-build-and-publish:
    name: Container Build and Publish into Registry
    needs: create-pr-to-main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository (latest main branch)
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Checkout artifact repository
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/Artifact_Storage
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: Artifact_Storage

      - name: Prepare artifact for Docker build
        run: cp Artifact_Storage/Backend_Artifact/Backend_Artifact-latest.zip ./artifact.zip

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t python-app:latest -f Dockerfile .

      - name: Tag image for GHCR
        run: |
          REPO_OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker tag python-app:latest ghcr.io/${REPO_OWNER_LC}/python-app:latest

      - name: Push image to GHCR
        run: |
          REPO_OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/${REPO_OWNER_LC}/python-app:latest
