name: python CI/CD - Feature to Development

on:
  pull_request:
    branches: [development]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  checkout-source-code:
    name: Checkout Source Code
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      should_run: ${{ steps.set_output.outputs.should_run }}
    steps:
      - id: set_output
        run: echo "should_run=true" >> $GITHUB_OUTPUT


  # testing:
  #   name: Run Unit Tests with Pytest
  #   needs: checkout-source-code
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout Code
  #       uses: actions/checkout@v4

  #     - name: Set up Python
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.10"

  #     - name: Install Dependencies
  #       run: |
  #         python -m pip install --upgrade pip
  #         pip install -r learning_app/requirements.txt
  #         pip install pytest pytest-cov

  #     - name: Run tests with coverage
  #       run: pytest learning_app/test_dir/tests/ --cov=learning_app --cov-report=xml --junitxml=pytest-report.xml


  build-and-publish-artifact:
    name: Build and Publish Artifact Package
    runs-on: ubuntu-latest
    needs: checkout-source-code
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
  
      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip
  
      # Create artifact.zip (final package)
      - name: Zip python build
        run: |
          zip -r artifact.zip . -x "*.git*" "*.github*" "*.gitignore"
          ls -lh artifact.zip
  
      # Authenticate with GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
  
      # Upload artifact.zip to GCS bucket (fixed path)
      - name: Upload artifact.zip to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: ./artifact.zip
          destination: kasandra-storage/python-app/${{ github.run_id }}/

  create-pr-development-to-main:
    needs: build-and-publish-artifact
    runs-on: ubuntu-latest
    outputs:
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create Pull Request from development to main
        id: create_pr
        uses: repo-sync/pull-request@v2
        with:
          source_branch: development
          destination_branch: main
          pr_title: "Auto PR: development to main"
          pr_body: |
            This PR was created from the development to main branch.
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Wait for PR Merge
        run: |
          PR_NUMBER=$(gh pr list --state open --head development --json number -q '.[0].number')
          while true; do
            STATE=$(gh pr view "$PR_NUMBER" --repo SoftwareStackSolutions/kasadra_backened_repo --json state -q .state)
            if [ "$STATE" = "MERGED" ]; then
              echo "PR #$PR_NUMBER has been merged!"
              break
            else
              echo "Not merged yet. Waiting for approval..."
              sleep 30
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

  Container-Build-and-Publish-into-Registry:
    name: Container Build and Publish into GCR
    needs: create-pr-development-to-main
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Ensure gcloud is authenticated
        run: |
          gcloud auth activate-service-account --key-file=${GOOGLE_APPLICATION_CREDENTIALS}
          gcloud config set project ${{ secrets.GCP_PROJECT }}
          gcloud auth list
          gsutil ls gs://kasandra-storage/python-app/ || true

      - name: Download artifact from GCS
        run: |
          gsutil cp gs://kasandra-storage/python-app/${{ github.run_id }}/artifact.zip ./artifact.zip
          ls -lh artifact.zip

      - name: Unzip artifact
        run: |
          unzip artifact.zip -d ./app
          ls -lh ./app

      - name: Build Docker image
        run: |
          docker build -t python-application:latest ./app
          
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Tag image for GCR
        run: |
          docker tag python-application:latest us-central1-docker.pkg.dev/red-global-467504/kasadra/python-application:latest

      - name: Push image to GCR
        run: |
          docker push us-central1-docker.pkg.dev/red-global-467504/kasadra/python-application:latest

  Deploy-Application-to-GKE:
    name: Deploy Application to GKE
    needs: Container-Build-and-Publish-into-Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up kubectl
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Deploy to GKE
        run: |
          kubectl apply -f config.yaml -n kasadara
          kubectl apply -f deployment.yaml -n kasadara
          kubectl apply -f service.yaml -n kasadara
          kubectl apply -f ingress.yaml -n kasadara
          sleep 59
          kubectl rollout restart deployment python-application -n kasadara
          kubectl get pods -n kasadara -o wide
          kubectl get svc -n kasadara -o wide
          kubectl get ingress -n kasadara -o wide
