apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-backend
  template:
    metadata:
      labels:
        app: python-backend
    spec:
      containers:
      - name: python-backend
        image: ghcr.io/<your-org>/backend-artifact:latest
        ports:
        - containerPort: 8000
      imagePullSecrets:
      - name: ghcr-secret
