apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-application
  template:
    metadata:
      labels:
        app: python-application
    spec:
      containers:
        - name: python-application
          image:  ghcr.io/softwarestacksolutions/python-application:latest
          ports:
            - containerPort: 3001
          imagePullPolicy: Always
      imagePullSecrets:
        - name: ghcr-secret
