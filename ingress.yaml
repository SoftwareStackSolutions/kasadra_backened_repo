apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-app-ingress
  namespace: kasadara
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - host: api.softwarestack.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: python-application-service
                port:
                  number: 80







